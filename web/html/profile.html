<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevPulse Profile</title>
  <link rel="stylesheet" href="/web/css/main.css">
</head>
<body>
  <div id="toast-container"></div>

  <!-- Page loader -->
  <div id="page-loader">
    <div class="spinner"></div>
  </div>

  <!-- 404 state (hidden by default) -->
  <div id="profile-404" class="page-404 hidden">
    <div class="code-404">404</div>
    <h2>Profile not found</h2>
    <p>This profile is private or doesn't exist.</p>
    <a href="/" class="btn btn-primary">Go home</a>
  </div>

  <!-- Error state -->
  <div id="profile-error" class="error-banner hidden" style="margin:2rem auto;max-width:480px"></div>

  <!-- Content (hidden until loaded) -->
  <div id="profile-content" class="hidden">

    <div class="profile-layout">

      <!-- Back -->
      <a href="/" class="profile-back">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        DevPulse
      </a>

      <!-- ── Profile header ── -->
      <div class="profile-header">
        <div class="profile-avatar-wrap">
          <img id="pf-avatar" class="avatar" width="88" height="88" src="" alt="avatar">
          <div class="profile-online"></div>
        </div>
        <div class="profile-info">
          <div class="profile-name" id="pf-name">Loading…</div>
          <div style="margin-bottom:.5rem">
            <a id="pf-username" class="profile-username" href="#" target="_blank" rel="noopener"></a>
          </div>
          <p class="profile-bio" id="pf-bio"></p>
          <div class="profile-meta">
            <span class="pill" id="pf-location" style="display:none"></span>
            <span class="pill pill-blue" id="pf-role" style="display:none"></span>
            <span class="viewers-badge" id="viewer-count-wrap">
              <span class="live-dot" style="width:6px;height:6px"></span>
              <span id="viewer-count">— viewers</span>
            </span>
          </div>
        </div>
      </div>

      <!-- ── Stats ── -->
      <div class="profile-stats-grid">
        <div class="stat-card accent-indigo">
          <div class="stat-label">Total commits</div>
          <div class="stat-value count-anim" id="ps-commits">—</div>
        </div>
        <div class="stat-card accent-green">
          <div class="stat-label">Streak</div>
          <div class="stat-value count-anim" id="ps-streak">—</div>
          <div class="stat-sub" id="ps-streak-sub"></div>
        </div>
        <div class="stat-card accent-blue">
          <div class="stat-label">Repos</div>
          <div class="stat-value count-anim" id="ps-repos">—</div>
          <div class="stat-sub" id="ps-repos-sub"></div>
        </div>
        <div class="stat-card accent-yellow">
          <div class="stat-label">Hours coded</div>
          <div class="stat-value count-anim" id="ps-hours">—</div>
          <div class="stat-sub" id="ps-hours-sub"></div>
        </div>
      </div>

      <!-- ── Activity + Languages ── -->
      <div class="profile-cols">
        <!-- Activity -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Recent activity</span>
            <span class="pill pill-green"><span class="live-dot" style="width:6px;height:6px"></span> Live</span>
          </div>
          <div class="activity-list" id="pf-activity">
            <div style="display:flex;flex-direction:column;gap:1rem;padding:.5rem 0">
              <div class="skeleton" style="height:14px;width:75%"></div>
              <div class="skeleton" style="height:14px;width:90%"></div>
              <div class="skeleton" style="height:14px;width:65%"></div>
            </div>
          </div>
        </div>

        <!-- Right column -->
        <div style="display:flex;flex-direction:column;gap:1.25rem">
          <!-- Languages -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Languages</span>
            </div>
            <div id="pf-langs">
              <div style="display:flex;flex-direction:column;gap:.75rem">
                <div class="skeleton" style="height:12px"></div>
                <div class="skeleton" style="height:12px;width:80%"></div>
                <div class="skeleton" style="height:12px;width:60%"></div>
              </div>
            </div>
          </div>

          <!-- Embed this profile -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Embed</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:.75rem">
              <div>
                <div style="font-size:.75rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem">Badge (Markdown)</div>
                <div class="copy-row">
                  <input class="copy-input" id="share-readme-md" readonly>
                  <button class="btn btn-outline btn-sm" data-copy="share-readme-md">Copy</button>
                </div>
              </div>
              <div>
                <div style="font-size:.75rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem">Badge image URL</div>
                <div class="copy-row">
                  <input class="copy-input" id="share-badge-url" readonly>
                  <button class="btn btn-outline btn-sm" data-copy="share-badge-url">Copy</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/web/js/api.js"></script>
  <script src="/web/js/profile.js"></script>
  <script>
    // Show hidden elements properly after JS loads content
    document.getElementById('pf-location')?.style.removeProperty('display');
    document.getElementById('pf-role')?.style.removeProperty('display');
  </script>
</body>
</html>
