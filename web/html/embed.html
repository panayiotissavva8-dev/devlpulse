<!DOCTYPE html>
<html lang="en" class="embed-page">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DevPulse Embed</title>
        <link rel="stylesheet" href="/web/css/main.css">
         <style>
    html, body { background: transparent; overflow: hidden; margin: 0; }
    body { display: flex; align-items: flex-start; justify-content: flex-start; padding: 4px; }
  </style>
    </head>
    <body class="embed-page">
        <a id="em-url" href="#" target="_blank" rel="noopener" style="text-decoration:none;display:block">
    <div class="embed-card" id="embed-card">
      <img class="embed-avatar" id="em-avatar" src="" alt="avatar">
      <div class="embed-info">
        <div class="embed-name" id="em-name">Loading…</div>
        <div class="embed-bio"  id="em-bio"></div>
        <div class="embed-stats">
          <div class="embed-stat"><span id="em-commits">—</span> commits</div>
          <div class="embed-stat"><span id="em-streak">—</span> streak</div>
          <div class="embed-stat"><span id="em-repos">—</span> repos</div>
        </div>
      </div>
      <div class="embed-live">
        <span class="live-dot" style="width:6px;height:6px"></span>
        Live
      </div>
    </div>
  </a>

  <script src="/web/js/embed.js"></script>
    </body>
</html>
