app = 'devpulse'
primary_region = 'ams'

[build]

[env]
  APP_ENV = 'production'
  APP_URL = 'https://devpulse.fly.dev'
  DB_PATH = '/data/devpulse.sqlite'
  PORT    = '8080'

[[mounts]]
  source      = 'devpulse_data'
  destination = '/data'

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes           = ['app']

  [[http_service.checks]]
    interval   = '15s'
    timeout    = '5s'
    grace_period = '20s'
    method     = 'GET'
    path       = '/'

[[vm]]
  size   = 'shared-cpu-1x'
  memory = '512mb'